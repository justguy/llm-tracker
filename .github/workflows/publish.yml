name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # No `registry-url`: that would write a .npmrc with always-auth=true +
      # _authToken=${NODE_AUTH_TOKEN}, which breaks OIDC because the empty
      # token is treated as "use this (broken) auth" instead of "fall through
      # to OIDC". Trusted publishing works against the default registry.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Upgrade npm (trusted publishing / OIDC requires npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Versions (for debug)
        run: |
          node --version
          npm --version

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish (trusted publishing via OIDC)
        run: npm publish --access public --provenance
