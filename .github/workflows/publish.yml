name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install npm@latest (OIDC requires >= 11.5.1)
        run: npm install -g npm@latest

      - name: Diagnostics
        run: |
          echo "--- versions ---"
          node --version
          npm --version
          which npm
          echo "--- OIDC env presence ---"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL:   ${ACTIONS_ID_TOKEN_REQUEST_URL:+SET}${ACTIONS_ID_TOKEN_REQUEST_URL:-UNSET}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+SET}${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-UNSET}"
          echo "--- npmrc contents ---"
          cat ~/.npmrc 2>/dev/null || echo "(no ~/.npmrc)"
          echo "--- repo .npmrc ---"
          cat .npmrc 2>/dev/null || echo "(no repo .npmrc)"

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish (trusted publishing via OIDC)
        run: npm publish --access public --provenance
